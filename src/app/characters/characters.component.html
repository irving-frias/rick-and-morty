<div ngClass="characters container">
  <h1>Characters</h1>

  <div class="row">
    <div class="col-md-6 col-lg-4 col-xl-3 character"
    *ngFor="
      let character of Characters
        | paginate
          : {
              itemsPerPage: 20,
              currentPage: pagination,
              totalItems: allCharacters
            }
      "
    >
      <div class="card">
        <img class="card-img-top" src="{{ character.image }}" alt="{{ character.name }}">
        <div class="card-body">
          <h3 class="card-title">{{ character.name }}</h3>
          <h4 class="card-subtitle">Status: {{ character.status }}</h4>
          <h4 class="card-subtitle">Gender: {{ character.gender }}</h4>
          <a [routerLink]="['/character', character.id]" class="btn btn-primary mt-2">Read More</a>
        </div>

        <div class="card-footer text-muted">
          {{ character.created | date: 'mediumDate' }}
        </div>
      </div>
    </div>

    <div class="d-flex justify-content-center">
      <pagination-controls
        (pageChange)="renderPage($event)"
      ></pagination-controls>
    </div>
  </div>
</div>
