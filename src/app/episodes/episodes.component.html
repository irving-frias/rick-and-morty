<div class="container">
  <h1>Episodes</h1>

  <div class="row">
    <div
      class="episode"
      *ngFor="
      let episode of Episodes
        | paginate
          : {
              itemsPerPage: 20,
              currentPage: pagination,
              totalItems: allEpisodes
            }
      "
    >
      <div>
        <a [routerLink]="['/episode', episode.id]" class="mt-2">{{ episode.name }}</a>
      </div>
    </div>

    <div class="d-flex justify-content-center">
      <pagination-controls
        (pageChange)="renderPage($event)"
      ></pagination-controls>
    </div>
  </div>
</div>
