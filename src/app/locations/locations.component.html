<div class="container">
  <h1>Locations</h1>

  <div class="row">
    <div
      class="location"
      *ngFor="
      let location of Locations
        | paginate
          : {
              itemsPerPage: 20,
              currentPage: pagination,
              totalItems: allLocations
            }
      "
    >
      <div>
        <a [routerLink]="['/location', location.id]" class="mt-2">{{ location.name }}</a>
      </div>
    </div>

    <div class="d-flex justify-content-center">
      <pagination-controls
        (pageChange)="renderPage($event)"
      ></pagination-controls>
    </div>
  </div>
</div>
